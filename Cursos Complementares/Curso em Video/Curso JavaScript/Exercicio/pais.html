<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pais</title>
</head>
<body>
    Informe o pais: <input type="text" name="pais" id="pais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="resp"></div>

    <script>
        function verificar() {
            let pais = window.document.querySelector('input#pais');
            let resp = window.document.querySelector('div#resp');

            //let p = String.value;

            resp.innerHTML = `Você mora em, ${pais.value}`;
            
            if ((pais.value == 'Brasil') || (pais.value == 'brasil')) {
                resp.innerHTML += '<br>Você é brasileiro!';
            } else {
                resp.innerHTML += '<br>Você é estrageiro!';
            }
        }
    </script>
</body>
</html>
